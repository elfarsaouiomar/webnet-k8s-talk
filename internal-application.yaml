apiVersion: v1
kind: Secret
metadata:
  name: nginx-secret
  namespace: internal
type: Opaque
stringData:
  DB_PASSWORD: "super-secret-password"
  API_KEY: "demo-api-key-123"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: internal
data:
  APP_MODE: "demo"
  LOG_LEVEL: "debug"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: internal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
        - name: nginxnn
          image: nginx:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: nginx-config
            - secretRef:
                name: nginx-secret
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx-demo
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP