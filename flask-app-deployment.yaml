apiVersion: v1
kind: Namespace
metadata:
  name: internal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: internal
  name: flask-demo-app
  labels:
    app: flask-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-demo
  template:
    metadata:
      labels:
        app: flask-demo
    spec:
      serviceAccountName: flask-demo-sa
      containers:
        - name: flask-demo
          image: docker.io/omarelfarsaoui/flask-app:5.0
          ports:
            - containerPort: 5500
          imagePullPolicy: Always
          resources:
            limits:
              cpu: "100m"
              memory: "150Mi"
            requests:
              cpu: "100m"
              memory: "150Mi"
          env:
            - name: FLASK_ENV
              value: "production"
            - name: EXTERNAL_API_KEY
              value: "my-secret-api-key"
            - name: DATABASE_URL
              value: "postgres://my-secret-db-username:my-secret-db-password@db-host:5432/my-database"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-demo-app
  namespace: internal
  labels:
    app: flask-demo
spec:
  type: NodePort
  selector:
    app: flask-demo
  ports:
    - protocol: TCP
      port: 5500
      targetPort: 5500
      nodePort: 31688
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flask-demo-sa
  namespace: internal
---
# Role - grants read access to deployments, services, and pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flask-demo-role
  namespace: internal
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
# RoleBinding - binds the Role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flask-demo-rolebinding
  namespace: internal
subjects:
  - kind: ServiceAccount
    name: flask-demo-sa
    namespace: internal
roleRef:
  kind: Role
  name: flask-demo-role
  apiGroup: rbac.authorization.k8s.io